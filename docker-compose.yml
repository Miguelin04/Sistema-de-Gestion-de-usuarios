version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ms_usuarios_db
    environment:
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: postgres123456
      POSTGRES_DB: db_usuarios
    ports:
      - "5432:5432"
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: ms_usuarios_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres_admin:postgres123456@db:5432/db_usuarios
      - ALLOWED_ORIGINS=*
      - GOOGLE_CLIENT_ID=883175682519-tv0t5ndf3185sdimdjd6ro9hack12m7r.apps.googleusercontent.com
      - MAIL_USERNAME=soporte.cloudconnect.unl@gmail.com
      - MAIL_PASSWORD=yaaclwkgpeembufr
      - MAIL_FROM=soporte.cloudconnect.unl@gmail.com
      - MAIL_PORT=587
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_STARTTLS=True
      - MAIL_SSL_TLS=False
      - JWT_SECRET_KEY=clave_super_secreta_123
      - FRONTEND_URL=http://3.21.50.248
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://3.21.50.248:8000/api
        - VITE_GOOGLE_CLIENT_ID=883175682519-tv0t5ndf3185sdimdjd6ro9hack12m7r.apps.googleusercontent.com
    container_name: ms_usuarios_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ms_usuarios_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: monitoreo_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoreo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: monitoreo_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

  kafka:
    image: apache/kafka:3.7.0
    container_name: monitoreo_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://monitoreo_kafka:29092,EXTERNAL://3.21.50.248:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: always

volumes:
  pgdata_usuarios:
  prometheus_data:
  grafana_data:
