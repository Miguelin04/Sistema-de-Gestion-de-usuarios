version: '3.8'

services:
  db_usuarios:
    image: postgres:15-alpine
    container_name: ms_usuarios_db
    environment:
      POSTGRES_DB: db_usuarios
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: postgres123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: ms_usuarios_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres_admin:postgres123456@db_usuarios:5432/db_usuarios
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - GOOGLE_CLIENT_ID=883175682519-tv0t5ndf3185sdimdjd6ro9hack12m7r.apps.googleusercontent.com
      - MAIL_USERNAME=soporte.cloudconnect.unl@gmail.com
      - MAIL_PASSWORD=yaaclwkgpeembufr
      - MAIL_FROM=soporte.cloudconnect.unl@gmail.com
      - MAIL_PORT=587
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_STARTTLS=True
      - MAIL_SSL_TLS=False
      - JWT_SECRET_KEY=clave_super_secreta_123
      - FRONTEND_URL=http://3.21.50.248
    depends_on:
      - db_usuarios
      - kafka
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://3.21.50.248:8000/api
        - VITE_GOOGLE_CLIENT_ID=883175682519-tv0t5ndf3185sdimdjd6ro9hack12m7r.apps.googleusercontent.com
    container_name: ms_usuarios_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: monitoreo_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: monitoreo_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoreo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: monitoreo_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: monitoreo_node_exporter
    ports:
      - "9100:9100"
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: ms_usuarios_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: always

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: monitoreo_kafka_exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    restart: always

volumes:
  pgdata_usuarios:
  prometheus_data:
  grafana_data:
