global:
  scrape_interval: 15s

scrape_configs:
  # 1. Métricas de la Aplicación (FastAPI Usuarios)
  - job_name: 'ms_usuarios_app'
    static_configs:
      - targets: ['backend:8000']

  # 2. Métricas de Infraestructura AWS (cAdvisor)
  # 2 y 4. Métricas de Infraestructura (cAdvisor AWS y GCP unidos)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080', '35.193.173.57:8080']

  # 3. Métricas de la Aplicación (FastAPI Eventos en GCP)
  - job_name: 'ms_eventos_app'
    static_configs:
      - targets: ['35.193.173.57:8000']

  # 5. Métricas del Host OS (Node Exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']
